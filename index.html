<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arc Pay — Payment Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root {
    --ink: #0e1613;
    --paper: #f6f4ee;
    --line: #d8d3c4;
    --usdc-blue: #2775ca;
    --ledger-green: #1c6e4a;
    --rust: #b5482e;
    --muted: #6b6a60;
    --card: #ffffff;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .mono { font-family: 'IBM Plex Mono', monospace; }

  header {
    padding: 28px 20px 20px;
    border-bottom: 2px solid var(--ink);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .brand .mark {
    width: 14px;
    height: 14px;
    background: var(--usdc-blue);
    border-radius: 50%;
    display: inline-block;
    transform: translateY(1px);
  }

  header h1 {
    font-size: 22px;
    margin: 0;
    letter-spacing: -0.01em;
    font-weight: 700;
  }

  .chain-tag {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'IBM Plex Mono', monospace;
  }

  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 20px 80px;
  }

  .connect-bar {
    display: flex;
    justify-content: center;
    margin: 40px 0;
  }

  button {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    border: 2px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    padding: 14px 22px;
    border-radius: 3px;
    font-size: 15px;
    cursor: pointer;
    transition: transform 0.08s ease, background 0.15s ease;
  }

  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.45; cursor: not-allowed; }

  button.ghost {
    background: transparent;
    color: var(--ink);
  }

  button.full { width: 100%; }

  .card {
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 18px;
  }

  .balance-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--ink);
    color: var(--paper);
    border: none;
  }

  .balance-card .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #b7c9c1;
    margin-bottom: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .balance-card .amount {
    font-size: 32px;
    font-weight: 700;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: -0.02em;
  }

  .balance-card .addr {
    font-size: 11px;
    color: #8fa39a;
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 8px;
  }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin: 28px 0 10px;
    display: flex;
    justify-content: space-between;
  }

  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'IBM Plex Mono', monospace;
  }

  input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--line);
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    background: var(--paper);
    color: var(--ink);
    margin-bottom: 14px;
  }

  input:focus {
    outline: none;
    border-color: var(--usdc-blue);
  }

  .field-row { display: flex; gap: 10px; }
  .field-row > div { flex: 1; }

  .status {
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 10px 12px;
    border-radius: 4px;
    margin-top: 12px;
    display: none;
  }

  .status.show { display: block; }
  .status.pending { background: #fff3d6; color: #8a6100; }
  .status.success { background: #e2f3ea; color: var(--ledger-green); }
  .status.error { background: #fbe4de; color: var(--rust); }

  .ledger-entry {
    border-bottom: 1px solid var(--line);
    padding: 14px 0;
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }

  .ledger-entry:last-child { border-bottom: none; }

  .ledger-entry .dir {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'IBM Plex Mono', monospace;
    padding: 2px 6px;
    border-radius: 3px;
    display: inline-block;
    margin-bottom: 4px;
  }

  .dir.out { background: #fbe4de; color: var(--rust); }
  .dir.in { background: #e2f3ea; color: var(--ledger-green); }

  .ledger-entry .addr-line {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    color: var(--ink);
  }

  .ledger-entry .memo {
    font-size: 13px;
    color: var(--muted);
    margin-top: 3px;
    font-style: italic;
  }

  .ledger-entry .amt {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 15px;
    white-space: nowrap;
  }

  .empty {
    text-align: center;
    padding: 30px 10px;
    color: var(--muted);
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .contract-line {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 30px;
    word-break: break-all;
  }

  .setup-note {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    max-width: 320px;
    margin: 12px auto 0;
    line-height: 1.5;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="mark"></span>
    <h1>Arc Pay</h1>
  </div>
  <span class="chain-tag">Arc Testnet · 5042002</span>
</header>

<main>

  <div id="disconnectedView">
    <div class="connect-bar">
      <button class="full" id="connectBtn">Connect wallet</button>
    </div>
    <p class="setup-note">
      Connects to MetaMask. Make sure you've added Arc Testnet
      (Chain ID 5042002) and have testnet USDC to cover gas.
    </p>
  </div>

  <div id="connectedView" style="display:none;">

    <div class="card balance-card">
      <div>
        <div class="label">Your balance</div>
        <div class="amount"><span id="balanceAmt">—</span></div>
        <div class="addr" id="walletAddr">0x...</div>
      </div>
      <button class="ghost" id="disconnectBtn" style="border-color:#3a453f; color:#f6f4ee;">Switch</button>
    </div>

    <div class="section-label">
      <span>Send payment</span>
    </div>

    <div class="card">
      <label for="toAddr">Recipient address</label>
      <input type="text" id="toAddr" placeholder="0x..." />

      <div class="field-row">
        <div>
          <label for="amount">Amount (USDC)</label>
          <input type="text" id="amount" placeholder="0.00" inputmode="decimal" />
        </div>
      </div>

      <label for="memo">Memo</label>
      <input type="text" id="memo" placeholder="What's this for?" maxlength="120" />

      <button class="full" id="sendBtn">Send payment</button>

      <div class="status" id="txStatus"></div>
    </div>

    <div class="section-label">
      <span>Payment history</span>
      <span id="historyCount" class="mono"></span>
    </div>

    <div class="card" id="historyCard">
      <div class="empty" id="historyEmpty">No payments yet. Send one above.</div>
      <div id="historyList"></div>
    </div>

    <div class="contract-line" id="contractLine"></div>

  </div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<script>
  // ---- Configuration ----
  const CONTRACT_ADDRESS = "0xd0c5f3e9570CcA0E9913522905b164304A692166"; // PaymentTracker on Arc Testnet
  const ARC_CHAIN_ID_HEX = "0x4CEF52"; // 5042002
  const ARC_CHAIN_ID_DEC = 5042002;
  const ARC_RPC = "https://5042002.rpc.thirdweb.com";
  const ARC_EXPLORER = "https://testnet.arcscan.app";

  const CONTRACT_ABI = [
    "function sendPayment(address to, string memo) external payable",
    "function paymentCount() external view returns (uint256)",
    "function getPaymentIdsForAddress(address user) external view returns (uint256[] memory)",
    "function getPayment(uint256 id) external view returns (address from, address to, uint256 amount, string memory memo, uint256 timestamp)",
    "event PaymentSent(uint256 indexed paymentId, address indexed from, address indexed to, uint256 amount, string memo, uint256 timestamp)"
  ];

  let provider, signer, userAddress, contract;

  const el = (id) => document.getElementById(id);
  const shorten = (addr) => addr ? addr.slice(0, 6) + "…" + addr.slice(-4) : "";

  el("connectBtn").addEventListener("click", connectWallet);
  el("disconnectBtn").addEventListener("click", () => location.reload());
  el("sendBtn").addEventListener("click", sendPayment);
  el("contractLine").textContent = "Contract: " + CONTRACT_ADDRESS;

  async function connectWallet() {
    if (!window.ethereum) {
      alert("No wallet found. Please open this page inside MetaMask's in-app browser, or install MetaMask.");
      return;
    }
    try {
      await window.ethereum.request({ method: "eth_requestAccounts" });
      provider = new ethers.providers.Web3Provider(window.ethereum);

      const network = await provider.getNetwork();
      if (network.chainId !== ARC_CHAIN_ID_DEC) {
        await switchToArc();
        provider = new ethers.providers.Web3Provider(window.ethereum);
      }

      signer = provider.getSigner();
      userAddress = await signer.getAddress();
      contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);

      el("disconnectedView").style.display = "none";
      el("connectedView").style.display = "block";
      el("walletAddr").textContent = userAddress;

      await refreshBalance();
      await refreshHistory();

      window.ethereum.on("accountsChanged", () => location.reload());
      window.ethereum.on("chainChanged", () => location.reload());
    } catch (err) {
      console.error(err);
      alert("Connection failed: " + (err.message || err));
    }
  }

  async function switchToArc() {
    try {
      await window.ethereum.request({
        method: "wallet_switchEthereumChain",
        params: [{ chainId: ARC_CHAIN_ID_HEX }],
      });
    } catch (switchError) {
      if (switchError.code === 4902) {
        await window.ethereum.request({
          method: "wallet_addEthereumChain",
          params: [{
            chainId: ARC_CHAIN_ID_HEX,
            chainName: "Arc Testnet",
            nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 6 },
            rpcUrls: [ARC_RPC],
            blockExplorerUrls: [ARC_EXPLORER],
          }],
        });
      } else {
        throw switchError;
      }
    }
  }

  async function refreshBalance() {
    try {
      const bal = await provider.getBalance(userAddress);
      // Arc's native token (USDC) uses 6 decimals, not 18
      const formatted = ethers.utils.formatUnits(bal, 18);
      el("balanceAmt").textContent = Number(formatted).toLocaleString(undefined, { maximumFractionDigits: 2 }) + " USDC";
    } catch (err) {
      console.error(err);
      el("balanceAmt").textContent = "—";
    }
  }

  function showStatus(message, type) {
    const s = el("txStatus");
    s.textContent = message;
    s.className = "status show " + type;
  }

  async function sendPayment() {
    const to = el("toAddr").value.trim();
    const amountStr = el("amount").value.trim();
    const memo = el("memo").value.trim() || "—";

    if (!ethers.utils.isAddress(to)) {
      showStatus("Enter a valid recipient address.", "error");
      return;
    }
    if (!amountStr || isNaN(amountStr) || Number(amountStr) <= 0) {
      showStatus("Enter a valid amount greater than 0.", "error");
      return;
    }

    try {
      el("sendBtn").disabled = true;
      showStatus("Confirm the transaction in your wallet…", "pending");

      // Arc native token uses 18 decimals
      const value = ethers.utils.parseUnits(amountStr, 18);
      const tx = await contract.sendPayment(to, memo, { value });

      showStatus("Transaction submitted. Waiting for confirmation…", "pending");
      await tx.wait();

      showStatus("Payment sent!", "success");
      el("toAddr").value = "";
      el("amount").value = "";
      el("memo").value = "";

      await refreshBalance();
      await refreshHistory();
    } catch (err) {
      console.error(err);
      const msg = err?.reason || err?.data?.message || err?.message || "Transaction failed.";
      showStatus(msg, "error");
    } finally {
      el("sendBtn").disabled = false;
    }
  }

  async function refreshHistory() {
    try {
      const ids = await contract.getPaymentIdsForAddress(userAddress);
      const list = el("historyList");
      const empty = el("historyEmpty");
      list.innerHTML = "";

      if (ids.length === 0) {
        empty.style.display = "block";
        el("historyCount").textContent = "";
        return;
      }
      empty.style.display = "none";
      el("historyCount").textContent = ids.length + " total";

      // Most recent first
      const sortedIds = [...ids].sort((a, b) => b.sub(a));

      for (const id of sortedIds) {
        const p = await contract.getPayment(id);
        const isOutgoing = p.from.toLowerCase() === userAddress.toLowerCase();
        const amt = ethers.utils.formatUnits(p.amount, 18);
        const date = new Date(p.timestamp.toNumber() * 1000);

        const entry = document.createElement("div");
        entry.className = "ledger-entry";
        entry.innerHTML = `
          <div>
            <span class="dir ${isOutgoing ? 'out' : 'in'}">${isOutgoing ? 'Sent' : 'Received'}</span>
            <div class="addr-line">${isOutgoing ? 'to ' + shorten(p.to) : 'from ' + shorten(p.from)}</div>
            <div class="memo">${escapeHtml(p.memo)}</div>
          </div>
          <div style="text-align:right;">
            <div class="amt" style="color:${isOutgoing ? 'var(--rust)' : 'var(--ledger-green)'}">
              ${isOutgoing ? '−' : '+'}${Number(amt).toLocaleString(undefined, { maximumFractionDigits: 2 })}
            </div>
            <div style="font-size:11px; color:var(--muted); font-family:'IBM Plex Mono',monospace;">
              ${date.toLocaleDateString()} ${date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
            </div>
          </div>
        `;
        list.appendChild(entry);
      }
    } catch (err) {
      console.error(err);
    }
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // Auto-connect if already authorized
  window.addEventListener("load", async () => {
    if (window.ethereum && window.ethereum.selectedAddress) {
      connectWallet();
    }
  });
</script>

</body>
</html>
