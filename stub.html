<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stub — Payment Requests</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --page-bg: #EDE6D3;
    --stub: #F2C744;
    --ink: #1B1F3B;
    --coral: #FF5A5F;
    --muted: #6B6F93;
    --paper: #FBF8EF;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--page-bg);
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    -webkit-font-smoothing: antialiased;
  }

  .display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.02em; }

  header {
    padding: 24px 20px 14px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  header .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.03em;
  }

  header .tag {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  main {
    max-width: 440px;
    margin: 0 auto;
    padding: 10px 20px 80px;
  }

  /* ---- Ticket / stub card ---- */
  .ticket {
    position: relative;
    background: var(--stub);
    border: 2px solid var(--ink);
    border-radius: 4px;
    padding: 28px 22px;
    margin: 30px 0;
    overflow: visible;
  }

  .ticket::before, .ticket::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 14px;
    background-image: radial-gradient(circle at 10px 50%, var(--page-bg) 6px, transparent 6.5px);
    background-size: 20px 14px;
    background-repeat: repeat-x;
  }
  .ticket::before { top: -8px; }
  .ticket::after { bottom: -8px; transform: rotate(180deg); }

  .ticket-eyebrow {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink);
    opacity: 0.6;
    margin-bottom: 4px;
  }

  .ticket-amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    line-height: 1;
    letter-spacing: 0.01em;
  }

  .ticket-memo {
    font-size: 13px;
    margin-top: 6px;
    font-style: italic;
    color: var(--ink);
  }

  .tear-line {
    border-top: 2px dashed var(--ink);
    opacity: 0.35;
    margin: 20px 0;
  }

  .ticket-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--ink);
    opacity: 0.75;
    margin-bottom: 6px;
  }

  .stamp {
    position: absolute;
    top: 18px;
    right: 18px;
    border: 3px solid var(--coral);
    color: var(--coral);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    padding: 4px 10px;
    border-radius: 4px;
    transform: rotate(10deg) scale(0);
    opacity: 0;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.2s;
  }
  .stamp.show { transform: rotate(10deg) scale(1); opacity: 0.9; }

  /* ---- Cards / forms ---- */
  .card {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    border-radius: 4px;
    padding: 18px;
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    padding: 12px 12px;
    border: 1.5px solid var(--ink);
    border-radius: 3px;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    background: var(--page-bg);
    color: var(--ink);
    margin-bottom: 14px;
  }

  input:focus { outline: none; border-color: var(--coral); }

  .row { display: flex; gap: 10px; }
  .row > div { flex: 1; }

  .toggle-group { display: flex; gap: 8px; margin-bottom: 14px; }

  button {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    border: 2px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    padding: 13px 18px;
    border-radius: 3px;
    font-size: 13px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    cursor: pointer;
  }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  button.ghost { background: transparent; color: var(--ink); }
  button.full { width: 100%; }
  button.toggle { flex: 1; opacity: 0.45; }
  button.toggle.active { opacity: 1; background: var(--coral); border-color: var(--coral); color: var(--paper); }

  .status {
    font-size: 12px;
    padding: 10px 12px;
    border-radius: 3px;
    margin-top: 12px;
    display: none;
    border: 1.5px solid var(--ink);
  }
  .status.show { display: block; }
  .status.pending { background: #fff3d6; }
  .status.success { background: #dff1e4; }
  .status.error { background: #fbe0e0; }

  #qrBox {
    display: flex;
    justify-content: center;
    margin: 16px 0;
    padding: 16px;
    background: #fff;
    border: 1.5px solid var(--ink);
    border-radius: 4px;
  }

  .link-box {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .link-box input {
    margin-bottom: 0;
    font-size: 11px;
  }

  .setup-note {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    max-width: 320px;
    margin: 20px auto 0;
    line-height: 1.5;
  }

  .connect-bar { display: flex; justify-content: center; margin: 30px 0; }
</style>
</head>
<body>

<header>
  <div class="logo">STUB</div>
  <div class="tag">Built on Arc · Payment Requests</div>
</header>

<main id="main"></main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  // ---- Configuration (same contracts as the first app) ----
  const CONTRACT_ADDRESS = "0xd0c5f3e9570CcA0E9913522905b164304A692166"; // PaymentTracker on Arc Testnet
  const ARC_CHAIN_ID_HEX = "0x4CEF52"; // 5042002
  const ARC_CHAIN_ID_DEC = 5042002;
  const ARC_RPC = "https://5042002.rpc.thirdweb.com";
  const ARC_EXPLORER = "https://testnet.arcscan.app";

  const EURC_ADDRESS = "0x89B50855Aa3bE2F677cD6303Cec089B5F319D72a";
  const EURC_DECIMALS = 6;

  const ERC20_ABI = [
    "function balanceOf(address owner) view returns (uint256)",
    "function transfer(address to, uint256 amount) returns (bool)"
  ];

  const CONTRACT_ABI = [
    "function sendPayment(address to, string memo) external payable"
  ];

  let provider, signer, userAddress, contract, eurcContract;

  const el = (id) => document.getElementById(id);
  const shorten = (addr) => addr ? addr.slice(0, 6) + "…" + addr.slice(-4) : "";
  const main = el("main");

  // ---- Request encoding: the whole request lives in the URL, no server needed ----
  function buildRequestLink(to, amt, cur, memo) {
    const params = new URLSearchParams({ to, amt, cur, memo });
    return location.origin + location.pathname + "?" + params.toString();
  }

  function parseRequestFromURL() {
    const params = new URLSearchParams(location.search);
    const to = params.get("to");
    const amt = params.get("amt");
    const cur = params.get("cur");
    const memo = params.get("memo") || "";
    if (!to || !amt || !cur) return null;
    if (!ethers.utils.isAddress(to)) return null;
    if (cur !== "USDC" && cur !== "EURC") return null;
    if (isNaN(amt) || Number(amt) <= 0) return null;
    return { to, amt, cur, memo };
  }

  async function connectWallet() {
    if (!window.ethereum) {
      alert("No wallet found. Open this page inside MetaMask's in-app browser, or install MetaMask.");
      return null;
    }
    await window.ethereum.request({ method: "eth_requestAccounts" });
    provider = new ethers.providers.Web3Provider(window.ethereum);

    const network = await provider.getNetwork();
    if (network.chainId !== ARC_CHAIN_ID_DEC) {
      await switchToArc();
      provider = new ethers.providers.Web3Provider(window.ethereum);
    }

    signer = provider.getSigner();
    userAddress = await signer.getAddress();
    contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);
    eurcContract = new ethers.Contract(EURC_ADDRESS, ERC20_ABI, signer);
    return userAddress;
  }

  async function switchToArc() {
    try {
      await window.ethereum.request({
        method: "wallet_switchEthereumChain",
        params: [{ chainId: ARC_CHAIN_ID_HEX }],
      });
    } catch (switchError) {
      if (switchError.code === 4902) {
        await window.ethereum.request({
          method: "wallet_addEthereumChain",
          params: [{
            chainId: ARC_CHAIN_ID_HEX,
            chainName: "Arc Testnet",
            nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 18 },
            rpcUrls: [ARC_RPC],
            blockExplorerUrls: [ARC_EXPLORER],
          }],
        });
      } else {
        throw switchError;
      }
    }
  }

  // =========================================================
  // CREATE MODE — build a request and generate a shareable link
  // =========================================================
  function renderCreateView() {
    main.innerHTML = `
      <div class="card" id="createCard">
        <label>Requesting as</label>
        <div class="connect-bar" id="connectBar">
          <button class="full" id="connectBtn">Connect wallet</button>
        </div>
        <div id="addrLine" style="display:none; font-size:12px; margin-bottom:14px;">
          Your address: <span id="myAddr"></span>
        </div>

        <div id="formFields" style="display:none;">
          <label>Currency</label>
          <div class="toggle-group">
            <button type="button" class="toggle active" id="curUsdc">USDC</button>
            <button type="button" class="toggle" id="curEurc">EURC</button>
          </div>

          <label for="amt">Amount</label>
          <input type="text" id="amt" placeholder="0.00" inputmode="decimal" />

          <label for="memo">What's it for?</label>
          <input type="text" id="memo" placeholder="Dinner, rent, etc." maxlength="80" />

          <button class="full" id="genBtn">Generate request</button>
        </div>
      </div>

      <div id="resultCard" style="display:none;">
        <div class="ticket">
          <div class="ticket-eyebrow">Request</div>
          <div class="ticket-amount"><span id="resAmt"></span></div>
          <div class="ticket-memo" id="resMemo"></div>
          <div class="tear-line"></div>
          <div class="ticket-row"><span>To</span><span id="resTo"></span></div>
        </div>
        <div id="qrBox"></div>
        <div class="card">
          <label>Shareable link</label>
          <div class="link-box">
            <input type="text" id="linkOut" readonly />
            <button id="copyBtn">Copy</button>
          </div>
        </div>
        <button class="full ghost" id="newReqBtn">Create another request</button>
      </div>
    `;

    let selectedCurrency = "USDC";

    el("connectBtn").addEventListener("click", async () => {
      try {
        const addr = await connectWallet();
        if (!addr) return;
        el("connectBar").style.display = "none";
        el("addrLine").style.display = "block";
        el("myAddr").textContent = shorten(addr);
        el("formFields").style.display = "block";
      } catch (err) {
        alert("Connection failed: " + (err.message || err));
      }
    });

    el("curUsdc").addEventListener("click", () => {
      selectedCurrency = "USDC";
      el("curUsdc").classList.add("active");
      el("curEurc").classList.remove("active");
    });
    el("curEurc").addEventListener("click", () => {
      selectedCurrency = "EURC";
      el("curEurc").classList.add("active");
      el("curUsdc").classList.remove("active");
    });

    el("genBtn").addEventListener("click", () => {
      const amt = el("amt").value.trim();
      const memo = el("memo").value.trim();
      if (!amt || isNaN(amt) || Number(amt) <= 0) {
        alert("Enter a valid amount.");
        return;
      }
      const link = buildRequestLink(userAddress, amt, selectedCurrency, memo);

      el("createCard").style.display = "none";
      el("resultCard").style.display = "block";
      el("resAmt").textContent = Number(amt).toLocaleString(undefined, { maximumFractionDigits: 2 }) + " " + selectedCurrency;
      el("resMemo").textContent = memo || "—";
      el("resTo").textContent = shorten(userAddress);
      el("linkOut").value = link;

      el("qrBox").innerHTML = "";
      new QRCode(el("qrBox"), { text: link, width: 180, height: 180 });
    });

    main.addEventListener("click", (e) => {
      if (e.target.id === "copyBtn") {
        navigator.clipboard.writeText(el("linkOut").value);
        e.target.textContent = "Copied!";
        setTimeout(() => e.target.textContent = "Copy", 1500);
      }
      if (e.target.id === "newReqBtn") {
        location.href = location.origin + location.pathname;
      }
    });
  }

  // =========================================================
  // PAY MODE — someone opened a request link
  // =========================================================
  function renderPayView(req) {
    main.innerHTML = `
      <div class="ticket">
        <div class="stamp" id="paidStamp">PAID</div>
        <div class="ticket-eyebrow">Payment requested</div>
        <div class="ticket-amount">${Number(req.amt).toLocaleString(undefined, { maximumFractionDigits: 2 })} ${req.cur}</div>
        <div class="ticket-memo">${req.memo ? escapeHtml(req.memo) : "No memo"}</div>
        <div class="tear-line"></div>
        <div class="ticket-row"><span>Pay to</span><span>${shorten(req.to)}</span></div>
        ${req.cur === "EURC" ? '<div class="ticket-row" style="opacity:0.6;"><span colspan="2">Note: EURC payments are not logged in payment history.</span></div>' : ''}
      </div>

      <div class="card" id="payCard">
        <div class="connect-bar" id="connectBar">
          <button class="full" id="connectBtn">Connect wallet to pay</button>
        </div>
        <button class="full" id="payBtn" style="display:none;">Pay ${req.cur}</button>
        <div class="status" id="payStatus"></div>
      </div>
    `;

    el("connectBtn").addEventListener("click", async () => {
      try {
        el("connectBtn").disabled = true;
        await connectWallet();
        el("connectBar").style.display = "none";
        el("payBtn").style.display = "block";
      } catch (err) {
        showPayStatus("Connection failed: " + (err.message || err), "error");
        el("connectBtn").disabled = false;
      }
    });

    el("payBtn").addEventListener("click", async () => {
      try {
        el("payBtn").disabled = true;
        showPayStatus("Confirm the transaction in your wallet…", "pending");

        let tx;
        if (req.cur === "USDC") {
          // Native USDC, uses PaymentTracker so it's logged (matches app #1)
          const value = ethers.utils.parseUnits(req.amt, 18);
          tx = await contract.sendPayment(req.to, req.memo || "—", { value });
        } else {
          // EURC is an ERC-20 token, sent directly via transfer()
          const value = ethers.utils.parseUnits(req.amt, EURC_DECIMALS);
          tx = await eurcContract.transfer(req.to, value);
        }

        showPayStatus("Submitted. Waiting for confirmation…", "pending");
        await tx.wait();

        showPayStatus("Payment complete!", "success");
        el("paidStamp").classList.add("show");
        el("payBtn").style.display = "none";
      } catch (err) {
        console.error(err);
        const msg = err?.reason || err?.data?.message || err?.message || "Transaction failed.";
        showPayStatus(msg, "error");
        el("payBtn").disabled = false;
      }
    });
  }

  function showPayStatus(msg, type) {
    const s = el("payStatus");
    s.textContent = msg;
    s.className = "status show " + type;
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // ---- Entry point: decide which mode to render ----
  const req = parseRequestFromURL();
  if (req) {
    renderPayView(req);
  } else {
    renderCreateView();
  }
</script>

</body>
</html>
